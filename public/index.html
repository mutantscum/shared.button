<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SWARM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: monospace;
            background: #0a0a0a;
            color: #eee;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }

        #join-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        #join-screen h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: normal;
            letter-spacing: 4px;
            color: #ff6600;
        }

        .subtitle {
            font-size: 12px;
            color: #555;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        #user-select {
            font-family: monospace;
            font-size: 18px;
            padding: 14px 20px;
            background: #1a1a1a;
            color: #eee;
            border: 1px solid #444;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 220px;
            -webkit-appearance: none;
        }

        #user-select option:disabled {
            color: #444;
            background: #111;
        }

        #join-btn {
            font-family: monospace;
            font-size: 16px;
            padding: 16px 50px;
            background: #ff6600;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        #mixer-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #status-bar {
            flex-shrink: 0;
            padding: 4px 12px;
            background: #111;
            border-bottom: 1px solid #ff6600;
            font-size: 10px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #status-bar .title {
            font-size: 12px;
            color: #ff6600;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .mixer-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6px;
        }

        .mixer-grid {
            display: flex;
            flex-direction: column;
            width: 100%;
            justify-content: center;
            gap: 4px;
        }

        .grid-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .row-label {
            width: 36px;
            min-width: 36px;
            font-size: 9px;
            color: #555;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: right;
            padding-right: 4px;
        }

        .row-cells {
            display: flex;
            gap: 4px;
            flex: 1;
            height: 100%;
        }

        .ch-label {
            flex: 1;
            text-align: center;
            font-size: 10px;
            color: #ff6600;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
        }

        .ch-btn {
            flex: 1;
            aspect-ratio: 1;
            border: 3px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #444;
            font-family: monospace;
            font-size: 8px;
            font-weight: bold;
            letter-spacing: 0px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        .ch-btn.cut-btn.active {
            background: #cc0000;
            border-color: #ff3333;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .ch-btn.aux1-btn.active {
            background: #0077cc;
            border-color: #33aaff;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 119, 204, 0.5);
        }

        .ch-btn.aux2-btn.active {
            background: #00aa44;
            border-color: #33dd66;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 170, 68, 0.5);
        }

        .ch-btn.aux3-btn.active {
            background: #9933cc;
            border-color: #bb55ee;
            color: #fff;
            box-shadow: 0 0 20px rgba(153, 51, 204, 0.5);
        }

        .ch-btn.aux4-btn.active {
            background: #cc7700;
            border-color: #ff9933;
            color: #fff;
            box-shadow: 0 0 20px rgba(204, 119, 0, 0.5);
        }
    </style>
</head>
<body>

    <div id="join-screen">
        <h1>SWARM</h1>
        <div class="subtitle">4-CH MIXER CONTROL</div>
        <select id="user-select">
            <option value="">Select user...</option>
        </select>
        <br><br>
        <button id="join-btn">Connect</button>
    </div>

    <div id="mixer-screen">
        <div id="status-bar">
            <span class="title">SWARM</span>
            <span id="connection-status">Connecting...</span>
            <span id="user-info"></span>
            <span id="user-count">0 users</span>
        </div>

        <div class="mixer-area">
            <div class="mixer-grid" id="mixer-grid"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var userId = null;

        var select = document.getElementById("user-select");
        for (var i = 1; i <= 100; i++) {
            var opt = document.createElement("option");
            opt.value = "User " + i;
            opt.textContent = "User " + i;
            select.appendChild(opt);
        }

        var grid = document.getElementById("mixer-grid");

        function makeRow(labelText, btnClass, btnLabel) {
            var row = document.createElement("div");
            row.className = "grid-row";

            var label = document.createElement("div");
            label.className = "row-label";
            label.textContent = labelText;
            row.appendChild(label);

            var cells = document.createElement("div");
            cells.className = "row-cells";

            var channelNames = ["DRUM", "BASS", "GTR", "HORN"];

            for (var ch = 1; ch <= 4; ch++) {
                if (labelText === "CH") {
                    var chLabel = document.createElement("div");
                    chLabel.className = "ch-label";
                    chLabel.textContent = channelNames[ch - 1];
                    cells.appendChild(chLabel);
                } else {
                    var btn = document.createElement("div");
                    btn.className = "ch-btn " + btnClass;
                    btn.setAttribute("data-channel", ch);
                    btn.textContent = btnLabel;
                    cells.appendChild(btn);
                }
            }

            row.appendChild(cells);
            grid.appendChild(row);
        }

        makeRow("CH", "", "");
        makeRow("CUT", "cut-btn", "CUT");
        makeRow("RVB1", "aux1-btn", "RVB1");
        makeRow("DLY", "aux2-btn", "DLY");
        makeRow("RVB2", "aux3-btn", "RVB2");
        makeRow("SDLY", "aux4-btn", "SDLY");

        document.getElementById("join-btn").addEventListener("click", function () {
            var selected = document.getElementById("user-select").value;
            if (!selected) return;
            userId = selected;
            socket.emit("join", userId);
            document.getElementById("join-screen").style.display = "none";
            document.getElementById("mixer-screen").style.display = "flex";
            document.getElementById("user-info").textContent = userId;
        });

        var cutBtns = document.querySelectorAll(".cut-btn");
        for (var i = 0; i < cutBtns.length; i++) {
            (function (btn) {
                var tapped = false;

                btn.addEventListener("touchend", function (e) {
                    e.preventDefault();
                    tapped = true;
                    var ch = parseInt(btn.getAttribute("data-channel"));
                    socket.emit("cut-toggle", ch);
                });

                btn.addEventListener("click", function () {
                    if (tapped) {
                        tapped = false;
                        return;
                    }
                    var ch = parseInt(btn.getAttribute("data-channel"));
                    socket.emit("cut-toggle", ch);
                });
            })(cutBtns[i]);
        }

        function setupMomentary(className, auxName) {
            var btns = document.querySelectorAll("." + className);
            for (var i = 0; i < btns.length; i++) {
                (function (btn) {
                    var pressed = false;
                    var ch = parseInt(btn.getAttribute("data-channel"));
                    function down() {
                        if (pressed) return;
                        pressed = true;
                        btn.classList.add("active");
                        socket.emit("aux-down", { channel: ch, aux: auxName });
                    }
                    function up() {
                        if (!pressed) return;
                        pressed = false;
                        btn.classList.remove("active");
                        socket.emit("aux-up", { channel: ch, aux: auxName });
                    }
                    btn.addEventListener("mousedown", down);
                    btn.addEventListener("mouseup", up);
                    btn.addEventListener("mouseleave", up);
                    btn.addEventListener("touchstart", function (e) { e.preventDefault(); down(); });
                    btn.addEventListener("touchend", function (e) { e.preventDefault(); up(); });
                    btn.addEventListener("touchcancel", function (e) { e.preventDefault(); up(); });
                })(btns[i]);
            }
        }

        setupMomentary("aux1-btn", "aux1");
        setupMomentary("aux2-btn", "aux2");
        setupMomentary("aux3-btn", "aux3");
        setupMomentary("aux4-btn", "aux4");

        socket.on("mixer-state", function (state) {
            for (var ch = 1; ch <= 4; ch++) {
                var cutBtn = document.querySelector('.cut-btn[data-channel="' + ch + '"]');
                if (state[ch] && state[ch].cut) { cutBtn.classList.add("active"); }
                else { cutBtn.classList.remove("active"); }
            }
        });

        socket.on("cut-update", function (data) {
            if (data.channel > 4) return;
            var cutBtn = document.querySelector('.cut-btn[data-channel="' + data.channel + '"]');
            if (data.state) { cutBtn.classList.add("active"); }
            else { cutBtn.classList.remove("active"); }
        });

        socket.on("aux-update", function (data) {
            if (data.channel > 4) return;
            var btn = document.querySelector("." + data.aux + '-btn[data-channel="' + data.channel + '"]');
            if (btn) {
                if (data.state) { btn.classList.add("active"); }
                else { btn.classList.remove("active"); }
            }
        });

        socket.on("users-update", function (users) {
            document.getElementById("user-count").textContent = users.length + " user" + (users.length === 1 ? "" : "s");
            var options = document.getElementById("user-select").options;
            for (var i = 1; i < options.length; i++) {
                if (users.indexOf(options[i].value) !== -1) {
                    options[i].disabled = true;
                    options[i].textContent = options[i].value + " (taken)";
                } else {
                    options[i].disabled = false;
                    options[i].textContent = options[i].value;
                }
            }
        });

        socket.on("connect", function () {
            document.getElementById("connection-status").textContent = "Connected";
            document.getElementById("connection-status").style.color = "#4f4";
        });

        socket.on("disconnect", function () {
            document.getElementById("connection-status").textContent = "Disconnected";
            document.getElementById("connection-status").style.color = "#f44";
        });
    </script>
</body>
</html>
