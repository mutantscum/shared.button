<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SWARM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: monospace;
            background: #1a1a1a;
            color: #eee;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        #join-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
        }

        #join-screen h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: normal;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: #666;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        #user-select {
            font-family: monospace;
            font-size: 18px;
            padding: 14px 20px;
            background: #333;
            color: #eee;
            border: 1px solid #555;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 220px;
            -webkit-appearance: none;
        }

        #user-select option:disabled {
            color: #555;
            background: #2a2a2a;
        }

        #join-btn {
            font-family: monospace;
            font-size: 16px;
            padding: 16px 50px;
            background: #ff8800;
            color: #111;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #mixer-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        #status-bar {
            flex-shrink: 0;
            padding: 8px 12px;
            background: #222;
            border-bottom: 1px solid #333;
            font-size: 11px;
            color: #888;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #status-bar .title {
            font-size: 14px;
            color: #ff8800;
            letter-spacing: 3px;
        }

        .mixer-area {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 8px 0;
        }

        .mixer-grid {
            display: inline-block;
            min-width: max-content;
            padding: 0 8px;
        }

        .grid-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .row-label {
            width: 44px;
            min-width: 44px;
            font-size: 9px;
            color: #555;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: right;
            padding-right: 8px;
        }

        .row-cells {
            display: flex;
            gap: 4px;
        }

        .ch-label {
            width: 52px;
            min-width: 52px;
            text-align: center;
            font-size: 11px;
            color: #888;
            padding: 4px 0;
            font-weight: bold;
        }

        .ch-btn {
            width: 52px;
            min-width: 52px;
            height: 52px;
            border: 2px solid #444;
            border-radius: 6px;
            background: #2a2a2a;
            color: #555;
            font-family: monospace;
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        .ch-btn.cut-btn.active {
            background: #cc0000;
            border-color: #ff3333;
            color: #fff;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.4);
        }

        .ch-btn.aux1-btn.active {
            background: #0077cc;
            border-color: #33aaff;
            color: #fff;
            box-shadow: 0 0 12px rgba(0, 119, 204, 0.4);
        }

        .ch-btn.aux2-btn.active {
            background: #00aa44;
            border-color: #33dd66;
            color: #fff;
            box-shadow: 0 0 12px rgba(0, 170, 68, 0.4);
        }

        @media (max-width: 480px) {
            .ch-btn {
                width: 58px;
                min-width: 58px;
                height: 58px;
                font-size: 10px;
                border-radius: 8px;
            }

            .ch-label {
                width: 58px;
                min-width: 58px;
            }

            .row-label {
                font-size: 8px;
                width: 36px;
                min-width: 36px;
                padding-right: 4px;
            }
        }

        @media (min-width: 1024px) {
            .ch-btn {
                width: 48px;
                min-width: 48px;
                height: 48px;
            }

            .ch-label {
                width: 48px;
                min-width: 48px;
            }

            .grid-row {
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body>

    <div id="join-screen">
        <h1>SWARM</h1>
        <div class="subtitle">24-CH MIXER CONTROL</div>
        <select id="user-select">
            <option value="">Select user...</option>
        </select>
        <br><br>
        <button id="join-btn">Connect</button>
    </div>

    <div id="mixer-screen">
        <div id="status-bar">
            <span class="title">SWARM</span>
            <span id="connection-status">Connecting...</span>
            <span id="user-info"></span>
            <span id="user-count">0 users</span>
        </div>

        <div class="mixer-area">
            <div class="mixer-grid" id="mixer-grid"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var userId = null;

        // Populate user dropdown 1-100
        var select = document.getElementById("user-select");
        for (var i = 1; i <= 100; i++) {
            var opt = document.createElement("option");
            opt.value = "User " + i;
            opt.textContent = "User " + i;
            select.appendChild(opt);
        }

        // Build mixer grid
        var grid = document.getElementById("mixer-grid");

        function makeRow(labelText, btnClass, btnLabel) {
            var row = document.createElement("div");
            row.className = "grid-row";

            var label = document.createElement("div");
            label.className = "row-label";
            label.textContent = labelText;
            row.appendChild(label);

            var cells = document.createElement("div");
            cells.className = "row-cells";

            for (var ch = 1; ch <= 24; ch++) {
                if (labelText === "CH") {
                    var chLabel = document.createElement("div");
                    chLabel.className = "ch-label";
                    chLabel.textContent = ch;
                    cells.appendChild(chLabel);
                } else {
                    var btn = document.createElement("div");
                    btn.className = "ch-btn " + btnClass;
                    btn.setAttribute("data-channel", ch);
                    btn.textContent = btnLabel;
                    cells.appendChild(btn);
                }
            }

            row.appendChild(cells);
            grid.appendChild(row);
        }

        makeRow("CH", "", "");
        makeRow("CUT", "cut-btn", "CUT");
        makeRow("AUX1", "aux1-btn", "AUX1");
        makeRow("AUX2", "aux2-btn", "AUX2");

        // Join
        document.getElementById("join-btn").addEventListener("click", function () {
            var selected = document.getElementById("user-select").value;
            if (!selected) {
                return;
            }
            userId = selected;
            socket.emit("join", userId);
            document.getElementById("join-screen").style.display = "none";
            document.getElementById("mixer-screen").style.display = "flex";
            document.getElementById("user-info").textContent = userId;
        });

        // CUT toggle
        var cutBtns = document.querySelectorAll(".cut-btn");
        for (var i = 0; i < cutBtns.length; i++) {
            (function (btn) {
                var tapped = false;

                btn.addEventListener("touchend", function (e) {
                    e.preventDefault();
                    tapped = true;
                    var ch = parseInt(btn.getAttribute("data-channel"));
                    socket.emit("cut-toggle", ch);
                });

                btn.addEventListener("click", function () {
                    if (tapped) {
                        tapped = false;
                        return;
                    }
                    var ch = parseInt(btn.getAttribute("data-channel"));
                    socket.emit("cut-toggle", ch);
                });
            })(cutBtns[i]);
        }

        // AUX momentary
        function setupMomentary(className, auxName) {
            var btns = document.querySelectorAll("." + className);
            for (var i = 0; i < btns.length; i++) {
                (function (btn) {
                    var pressed = false;
                    var ch = parseInt(btn.getAttribute("data-channel"));

                    function down() {
                        if (pressed) { return; }
                        pressed = true;
                        btn.classList.add("active");
                        socket.emit("aux-down", { channel: ch, aux: auxName });
                    }

                    function up() {
                        if (!pressed) { return; }
                        pressed = false;
                        btn.classList.remove("active");
                        socket.emit("aux-up", { channel: ch, aux: auxName });
                    }

                    btn.addEventListener("mousedown", down);
                    btn.addEventListener("mouseup", up);
                    btn.addEventListener("mouseleave", up);

                    btn.addEventListener("touchstart", function (e) {
                        e.preventDefault();
                        down();
                    });
                    btn.addEventListener("touchend", function (e) {
                        e.preventDefault();
                        up();
                    });
                    btn.addEventListener("touchcancel", function (e) {
                        e.preventDefault();
                        up();
                    });
                })(btns[i]);
            }
        }

        setupMomentary("aux1-btn", "aux1");
        setupMomentary("aux2-btn", "aux2");

        // Receive full mixer state on join
        socket.on("mixer-state", function (state) {
            for (var ch = 1; ch <= 24; ch++) {
                var cutBtn = document.querySelector('.cut-btn[data-channel="' + ch + '"]');
                if (state[ch].cut) {
                    cutBtn.classList.add("active");
                } else {
                    cutBtn.classList.remove("active");
                }
            }
        });

        // Receive cut toggle
        socket.on("cut-update", function (data) {
            var cutBtn = document.querySelector('.cut-btn[data-channel="' + data.channel + '"]');
            if (data.state) {
                cutBtn.classList.add("active");
            } else {
                cutBtn.classList.remove("active");
            }
        });

        // Receive aux momentary
        socket.on("aux-update", function (data) {
            var btn = document.querySelector("." + data.aux + '-btn[data-channel="' + data.channel + '"]');
            if (data.state) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });

        // User count and grey out taken
        socket.on("users-update", function (users) {
            document.getElementById("user-count").textContent = users.length + " user" + (users.length === 1 ? "" : "s");

            var options = document.getElementById("user-select").options;
            for (var i = 1; i < options.length; i++) {
                if (users.indexOf(options[i].value) !== -1) {
                    options[i].disabled = true;
                    options[i].textContent = options[i].value + " (taken)";
                } else {
                    options[i].disabled = false;
                    options[i].textContent = options[i].value;
                }
            }
        });

        // Connection status
        socket.on("connect", function () {
            document.getElementById("connection-status").textContent = "Connected";
            document.getElementById("connection-status").style.color = "#4f4";
        });

        socket.on("disconnect", function () {
            document.getElementById("connection-status").textContent = "Disconnected";
            document.getElementById("connection-status").style.color = "#f44";
        });
    </script>
</body>
</html>
